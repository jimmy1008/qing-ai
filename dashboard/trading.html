<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>看盤 & 交易日誌 — 晴 DTFX</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .trading-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      margin-top: 12px;
    }
    .tl { display: flex; flex-direction: column; gap: 14px; }
    .tr { display: flex; flex-direction: column; gap: 14px; }

    /* outcome chips */
    .chip-win        { background:#1a3a1a; color:#4ade80; border:1px solid #166534; }
    .chip-loss       { background:#3a1a1a; color:#f87171; border:1px solid #991b1b; }
    .chip-breakeven  { background:#2a2a1a; color:#fde68a; border:1px solid #92400e; }
    .chip-open       { background:#1e2f50; color:#60a5fa; border:1px solid #1e3a8a; }
    .chip-long       { background:#1a3a2a; color:#34d399; border:1px solid #065f46; }
    .chip-short      { background:#3a1a2a; color:#fb7185; border:1px solid #9f1239; }
    .chip-simulated  { background:#2a1a3a; color:#c084fc; border:1px solid #7e22ce; font-size:10px; }

    .outcome-chip, .dir-chip {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* trade card */
    .trade-card {
      background: var(--bg-card, #1a1d23);
      border: 1px solid var(--border, #2a2d35);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .trade-card .tc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .trade-card .tc-prices {
      font-size: 12px;
      color: #8b8fa8;
    }
    .trade-card .tc-prices span { margin-right: 12px; }
    .trade-card .tc-reason {
      font-size: 12px;
      color: #b0b3c4;
      border-top: 1px solid #2a2d35;
      padding-top: 6px;
      margin-top: 4px;
    }
    .trade-card .tc-reflection {
      font-size: 12px;
      color: #7dd3fc;
      font-style: italic;
      border-top: 1px solid #2a2d35;
      padding-top: 6px;
    }
    .trade-card .tc-rr {
      font-size: 13px;
      color: #a3a8c0;
    }
    .trade-card .tc-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    /* log form */
    .log-form { display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: flex; gap: 8px; }
    .form-row label { font-size: 12px; color: #8b8fa8; display: flex; flex-direction: column; gap: 3px; flex: 1; }
    .form-row input, .form-row select {
      background: #0d0f14; border: 1px solid #2a2d35; border-radius: 4px;
      color: #e2e4ef; padding: 5px 8px; font-size: 13px; width: 100%;
    }
    textarea.note-input {
      background: #0d0f14; border: 1px solid #2a2d35; border-radius: 4px;
      color: #e2e4ef; padding: 7px 10px; font-size: 13px;
      width: 100%; resize: vertical; min-height: 70px;
    }

    /* stats row */
    .stat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .stat-chip {
      background: #1a1d23; border: 1px solid #2a2d35; border-radius: 6px;
      padding: 5px 12px; font-size: 13px; display: flex; flex-direction: column;
      align-items: center; min-width: 80px;
    }
    .stat-chip .sc-val  { font-size: 20px; font-weight: 700; color: #e2e4ef; line-height: 1.2; }
    .stat-chip .sc-lbl  { font-size: 10px; color: #6b6f85; margin-top: 2px; }

    /* reflection / review text */
    .ai-text {
      background: #111520; border: 1px solid #2a2d35; border-radius: 6px;
      padding: 12px 14px; font-size: 13px; color: #93c5fd; line-height: 1.7;
      white-space: pre-wrap;
    }

    /* close modal overlay */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #1a1d23; border: 1px solid #2a2d35; border-radius: 10px;
      padding: 22px 24px; width: 380px; display: flex; flex-direction: column; gap: 12px;
    }
    .modal-title { font-size: 16px; font-weight: 700; }

    /* market watch panel */
    .mw-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    .mw-card {
      background: #0d0f14;
      border: 1px solid #2a2d35;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .mw-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .mw-asset { font-size: 18px; font-weight: 700; }
    .mw-price { font-size: 24px; font-weight: 700; color: #e2e4ef; }
    .mw-change-pos { color: #4ade80; font-size: 13px; }
    .mw-change-neg { color: #f87171; font-size: 13px; }
    .mw-indicators {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
    }
    .mw-ind-chip {
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 4px;
      padding: 2px 8px;
      color: #8b8fa8;
    }
    .mw-bias {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .bias-strong_long  { background:#1a3a1a; color:#4ade80; border:1px solid #166534; }
    .bias-lean_long    { background:#1a2a1a; color:#86efac; border:1px solid #166534; }
    .bias-neutral      { background:#1e2030; color:#93c5fd; border:1px solid #1e3a8a; }
    .bias-lean_short   { background:#2a1a1a; color:#fca5a5; border:1px solid #991b1b; }
    .bias-strong_short { background:#3a1a1a; color:#f87171; border:1px solid #991b1b; }
    .mw-tf-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .mw-tf-chip {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 4px;
      font-weight: 600;
    }
    .mw-tf-bullish { background:#1a3a2a; color:#34d399; border:1px solid #065f46; }
    .mw-tf-bearish { background:#3a1a1a; color:#f87171; border:1px solid #991b1b; }
    .mw-tf-ranging { background:#1e2030; color:#93c5fd; border:1px solid #1e3a8a; }
    .mw-tf-undef   { background:#202020; color:#6b6f85; border:1px solid #333; }
    .mw-trade-idea {
      margin-top: 10px;
      font-size: 12px;
      color: #7dd3fc;
      line-height: 1.6;
      font-style: italic;
      border-top: 1px solid #2a2d35;
      padding-top: 8px;
      white-space: pre-wrap;
    }
    .mw-levels {
      margin-top: 8px;
      font-size: 11px;
      color: #8b8fa8;
    }
    .mw-levels .lbl { color: #6b6f85; margin-right: 4px; }

    @media (max-width: 900px) {
      .trading-grid { grid-template-columns: 1fr; }
      .mw-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title-block">
      <h1>晴的交易日誌</h1>
      <div class="meta-row">
        <span id="statsLine">載入中...</span>
      </div>
    </div>
    <nav class="topbar-nav">
      <button class="btn" type="button" onclick="location.href='/'">← 總覽</button>
      <div class="nav-sep"></div>
      <button class="btn" type="button" onclick="location.href='/threads-moderation'">Threads 審核</button>
      <button class="btn" type="button" onclick="location.href='/ai-cognition'">AI 認知</button>
      <button class="btn" type="button" onclick="location.href='/lora-dashboard.html'">LoRA 訓練</button>
      <button class="btn" type="button" onclick="location.href='/relationships'">關係記憶</button>
      <button class="btn" type="button" onclick="location.href='/emotion-log'">情緒日誌</button>
      <button class="btn active" type="button">交易日誌</button>
      <div class="nav-sep"></div>
      <button class="btn" type="button" onclick="location.href='/chart'">圖表分析</button>
      <button class="btn" type="button" onclick="observeMarket('BTC')">觀察 BTC</button>
      <button class="btn" type="button" onclick="observeMarket('ETH')">觀察 ETH</button>
      <button class="btn" type="button" onclick="loadReview()">週期回顧</button>
      <button class="btn" type="button" onclick="loadHypothesis()">優化假設</button>
      <button class="btn" type="button" onclick="refreshSnapshots()">刷新快照</button>
    </nav>
  </header>

  <main style="padding:16px;">

    <!-- Market Watch -->
    <div style="margin-bottom:4px;font-size:13px;color:#6b6f85;display:flex;align-items:center;gap:12px;">
      <span style="font-weight:700;color:#b0b3c4;">市場觀察</span>
      <span id="observeStatus" style="font-size:12px;"></span>
    </div>
    <div class="mw-grid">
      <div class="mw-card" id="mw-BTC"><div style="color:#6b6f85;font-size:13px;">點擊「觀察 BTC」載入分析</div></div>
      <div class="mw-card" id="mw-ETH"><div style="color:#6b6f85;font-size:13px;">點擊「觀察 ETH」載入分析</div></div>
    </div>

    <div class="trading-grid">
      <!-- Left: log form + stats -->
      <div class="tl">
        <!-- Scheduler status -->
        <div class="panel">
          <div class="panel-title" style="display:flex;align-items:center;gap:8px;">
            晴的看盤排程
            <span id="schedulerDot" style="width:8px;height:8px;border-radius:50%;background:#6b6f85;display:inline-block;"></span>
          </div>
          <div id="schedulerStatus" style="font-size:12px;color:#8b8fa8;line-height:1.8;"></div>
        </div>

        <!-- Stats (real only) -->
        <div class="panel">
          <div class="panel-title">真實策略表現</div>
          <div class="stat-chips" id="statsChips">
            <div class="stat-chip"><span class="sc-val" id="sTotal">-</span><span class="sc-lbl">總交易</span></div>
            <div class="stat-chip"><span class="sc-val" id="sWinRate">-</span><span class="sc-lbl">勝率</span></div>
            <div class="stat-chip"><span class="sc-val" id="sAvgRR">-</span><span class="sc-lbl">平均 RR</span></div>
            <div class="stat-chip"><span class="sc-val" id="sWins" style="color:#4ade80">-</span><span class="sc-lbl">勝</span></div>
            <div class="stat-chip"><span class="sc-val" id="sLosses" style="color:#f87171">-</span><span class="sc-lbl">敗</span></div>
          </div>
          <div id="sessionStats" style="font-size:12px;color:#6b6f85;margin-top:6px;"></div>
        </div>

        <!-- Simulated stats -->
        <div class="panel">
          <div class="panel-title" style="color:#c084fc;display:flex;align-items:center;justify-content:space-between;">
            模擬交易表現
            <button class="btn" type="button" onclick="clearSimTrades()" style="font-size:11px;padding:2px 8px;color:#f87171;border-color:#7f1d1d;">清空模擬倉</button>
          </div>
          <div class="stat-chips">
            <div class="stat-chip"><span class="sc-val" id="ssTotal" style="color:#c084fc;">-</span><span class="sc-lbl">模擬總計</span></div>
            <div class="stat-chip"><span class="sc-val" id="ssWinRate">-</span><span class="sc-lbl">勝率</span></div>
            <div class="stat-chip"><span class="sc-val" id="ssAvgRR">-</span><span class="sc-lbl">平均 RR</span></div>
            <div class="stat-chip"><span class="sc-val" id="ssWins" style="color:#4ade80">-</span><span class="sc-lbl">勝</span></div>
            <div class="stat-chip"><span class="sc-val" id="ssLosses" style="color:#f87171">-</span><span class="sc-lbl">敗</span></div>
          </div>
        </div>

        <!-- Log trade form -->
        <div class="panel">
          <div class="panel-title" onclick="toggleSection('logForm','logArrow')" style="cursor:pointer;user-select:none;">記錄交易 <span id="logArrow" style="font-size:11px;color:#6b6f85;">▶</span></div>
          <div class="log-form" id="logForm" style="display:none;">
            <div class="form-row">
              <label>交易對
                <input id="fPair" type="text" placeholder="BTCUSDT" value="BTCUSDT">
              </label>
              <label>方向
                <select id="fDir">
                  <option value="long">多 Long</option>
                  <option value="short">空 Short</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>入場價
                <input id="fEntry" type="number" step="any" placeholder="64000">
              </label>
              <label>止損
                <input id="fStop" type="number" step="any" placeholder="63200">
              </label>
              <label>止盈
                <input id="fTarget" type="number" step="any" placeholder="67000">
              </label>
            </div>
            <div class="form-row">
              <label>Session
                <select id="fSession">
                  <option value="london">倫敦盤</option>
                  <option value="new_york">紐約盤</option>
                  <option value="asia">亞洲盤</option>
                  <option value="unknown">不確定</option>
                </select>
              </label>
              <label>時框
                <select id="fTF">
                  <option value="1H">1H</option>
                  <option value="4H">4H</option>
                  <option value="15M">15M</option>
                  <option value="1D">1D</option>
                </select>
              </label>
            </div>
            <div class="form-row">
              <label>入場方式
                <select id="fEntryType">
                  <option value="confirmation_entry">confirmation</option>
                  <option value="touch_entry">touch</option>
                  <option value="structure_confirmation">structure confirm</option>
                </select>
              </label>
              <label>關鍵區域
                <select id="fKeyArea">
                  <option value="OB">OB</option>
                  <option value="FVG">FVG</option>
                  <option value="SSL">SSL</option>
                  <option value="BSL">BSL</option>
                  <option value="EQ">EQ</option>
                </select>
              </label>
            </div>
            <label style="font-size:12px;color:#8b8fa8;">市場結構
              <input id="fStructure" type="text" placeholder="BOS on 1H, higher low confirmed">
            </label>
            <label style="font-size:12px;color:#8b8fa8;">入場理由
              <textarea class="note-input" id="fReason" placeholder="DTFX OB 反應，成交量增加..."></textarea>
            </label>
            <div id="rrPreview" style="font-size:13px;color:#7dd3fc;height:18px;"></div>
            <button class="btn" type="button" onclick="submitLog()">記錄這筆交易</button>
          </div>
        </div>

        <!-- Analyze setup -->
        <div class="panel">
          <div class="panel-title" onclick="toggleSection('analyzePanel','analyzeArrow')" style="cursor:pointer;user-select:none;">入場前分析 <span id="analyzeArrow" style="font-size:11px;color:#6b6f85;">▶</span></div>
          <div id="analyzePanel" style="display:none;">
            <button class="btn" type="button" onclick="analyzeCurrentSetup()">讓晴分析這個 Setup</button>
            <div id="analyzeResult" class="ai-text" style="display:none;margin-top:10px;"></div>
          </div>
        </div>
      </div>

      <!-- Right: journal + review -->
      <div class="tr">
        <!-- AI review / hypothesis -->
        <div id="reviewPanel" class="panel" style="display:none;">
          <div class="panel-title" id="reviewTitle">回顧</div>
          <div id="reviewText" class="ai-text"></div>
        </div>

        <!-- Journal with tabs -->
        <div class="panel">
          <div class="panel-title" style="display:flex;align-items:center;gap:10px;">
            交易日誌
            <button id="tabReal" class="btn" style="font-size:11px;padding:2px 10px;background:#1e3a8a;" onclick="switchTab('real')">真實</button>
            <button id="tabSim" class="btn" style="font-size:11px;padding:2px 10px;" onclick="switchTab('sim')">模擬 <span id="simBadge" style="color:#c084fc;"></span></button>
          </div>
          <div id="journalList" style="display:flex;flex-direction:column;gap:10px;"></div>
        </div>
      </div>
    </div>
    </div><!-- end trading-grid outer -->
  </main>

  <!-- Close trade modal -->
  <div class="modal-overlay" id="closeModal">
    <div class="modal-box">
      <div class="modal-title">結束交易</div>
      <input type="hidden" id="closeId">
      <div class="form-row">
        <label>結果
          <select id="closeOutcome">
            <option value="win">獲利 Win</option>
            <option value="loss">虧損 Loss</option>
            <option value="breakeven">保本 BE</option>
          </select>
        </label>
        <label>出場價格
          <input id="closeExit" type="number" step="any" placeholder="66500">
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <button class="btn" type="button" onclick="submitClose()">確認</button>
        <button class="btn" type="button" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <script>
  // ── Auth token ────────────────────────────────────────────────────────────
  function getToken() {
    const urlToken = new URLSearchParams(location.search).get('token');
    if (urlToken) { localStorage.setItem('teamToken', urlToken); return urlToken; }
    let t = localStorage.getItem('teamToken');
    if (!t) {
      t = prompt('請輸入 Team Token：') || '';
      if (t) localStorage.setItem('teamToken', t);
    }
    return t;
  }
  const TEAM_TOKEN = getToken();

  function apiFetch(url, opts = {}) {
    const headers = Object.assign({ 'x-team-token': TEAM_TOKEN }, opts.headers || {});
    return fetch(url, Object.assign({}, opts, { headers }));
  }

  // ── State ──────────────────────────────────────────────────────────────────
  let trades = [];
  let simTrades = [];
  let currentTab = 'real';

  // ── Init ───────────────────────────────────────────────────────────────────
  loadData();
  setInterval(loadData, 30000);
  refreshSnapshots();
  setInterval(refreshSnapshots, 60000);
  loadSchedulerStatus();
  setInterval(loadSchedulerStatus, 60000);

  // ── Market Observation ─────────────────────────────────────────────────────

  async function refreshSnapshots() {
    for (const asset of ['BTC','ETH']) {
      try {
        const snap = await apiFetch(`/api/trading/observe/${asset}/quick`).then(r=>r.json());
        if (!snap.error) renderSnapshotCard(asset, snap);
      } catch {}
    }
  }

  async function observeMarket(asset) {
    const card = document.getElementById('mw-'+asset);
    card.innerHTML = `<div style="color:#6b6f85;font-size:13px;">⏳ 正在觀察 ${asset}，拉取 TradingView 資料 + DTFX 分析中...</div>`;
    document.getElementById('observeStatus').textContent = `分析 ${asset} 中...`;
    try {
      const res = await apiFetch(`/api/trading/observe/${asset}`).then(r=>r.json());
      if (res.error) { card.innerHTML = `<div style="color:#f87171;">${res.error}</div>`; return; }
      renderObservationCard(asset, res);
      document.getElementById('observeStatus').textContent =
        `${asset} 更新於 ${new Date().toLocaleTimeString('zh-TW')}`;
    } catch(e) {
      card.innerHTML = `<div style="color:#f87171;">觀察失敗：${e.message}</div>`;
    }
  }

  function renderSnapshotCard(asset, snap) {
    const card = document.getElementById('mw-'+asset);
    // Only update if no full observation loaded yet
    if (card.dataset.full === '1') return;
    const chg = snap.change_pct;
    const chgClass = chg >= 0 ? 'mw-change-pos' : 'mw-change-neg';
    const chgSign  = chg >= 0 ? '+' : '';
    card.innerHTML = `
      <div class="mw-header">
        <span class="mw-asset">${asset}/USDT</span>
        <span style="font-size:11px;color:#6b6f85;">快照</span>
      </div>
      <div class="mw-price">${snap.price?.toLocaleString() || '-'}</div>
      <div class="${chgClass}">${chgSign}${chg}%</div>
      <div class="mw-indicators">
        ${snap.indicators?.rsi != null ? `<span class="mw-ind-chip">RSI ${snap.indicators.rsi}</span>` : ''}
        ${snap.indicators?.recommend != null ? `<span class="mw-ind-chip">TV Rec ${snap.indicators.recommend > 0 ? '買' : snap.indicators.recommend < 0 ? '賣' : '中立'}</span>` : ''}
        ${snap.volume ? `<span class="mw-ind-chip">Vol ${fmtVol(snap.volume)}</span>` : ''}
      </div>
      <div style="margin-top:8px;font-size:11px;color:#6b6f85;">點「觀察 ${asset}」進行 DTFX 完整分析</div>
    `;
  }

  function renderObservationCard(asset, obs) {
    const card = document.getElementById('mw-'+asset);
    card.dataset.full = '1';
    const chg = obs.change_pct;
    const chgClass = chg >= 0 ? 'mw-change-pos' : 'mw-change-neg';
    const chgSign  = chg >= 0 ? '+' : '';
    const bias = obs.confluence?.overall_bias || 'neutral';
    const biasCls = 'mw-bias bias-' + bias.replace('_','-');
    const score = obs.confluence?.avg_setup_score || 0;

    const tfBiases = obs.confluence?.tf_biases || {};
    const tfTrends = obs.confluence?.tf_trends || {};
    const tfChips = ['4H','1H','15M','5M'].map(tf => {
      const trend = tfTrends[tf] || 'undefined';
      const cls   = trend === 'bullish' ? 'mw-tf-bullish' : trend === 'bearish' ? 'mw-tf-bearish' : trend === 'ranging' ? 'mw-tf-ranging' : 'mw-tf-undef';
      return `<span class="mw-tf-chip ${cls}">${tf}: ${trend}</span>`;
    }).join('');

    // Key levels
    const obs_list = (obs.key_levels?.order_blocks || []).slice(0,2)
      .map(o => `${o.type} ${o.bottom?.toLocaleString()}–${o.top?.toLocaleString()}`).join(' | ');
    const fvg_list = (obs.key_levels?.fvgs || []).slice(0,2)
      .map(f => `${f.type} ${f.bottom?.toLocaleString()}–${f.top?.toLocaleString()}`).join(' | ');
    const liq = obs.key_levels?.liquidity;
    const bslStr = (liq?.bsl || []).slice(0,2).map(l=>l.level?.toLocaleString()).join(', ') || '—';
    const sslStr = (liq?.ssl || []).slice(0,2).map(l=>l.level?.toLocaleString()).join(', ') || '—';

    const tradeIdea = obs.trade_idea
      ? `<div class="mw-trade-idea">${obs.trade_idea}</div>` : '';

    card.innerHTML = `
      <div class="mw-header">
        <span class="mw-asset">${asset}/USDT</span>
        <span class="${biasCls}">${bias.replace('_',' ')}</span>
      </div>
      <div class="mw-price">${obs.price?.toLocaleString() || '-'}</div>
      <div class="${chgClass}">${chgSign}${chg}%  &nbsp;|&nbsp; Setup ${score}/100</div>
      <div class="mw-tf-row">${tfChips}</div>
      <div class="mw-indicators">
        ${obs.indicators?.rsi != null ? `<span class="mw-ind-chip">RSI ${obs.indicators.rsi}</span>` : ''}
        ${obs.latest_bos ? `<span class="mw-ind-chip">${obs.latest_bos.type}</span>` : ''}
        ${obs.latest_choch ? `<span class="mw-ind-chip">${obs.latest_choch.type}</span>` : ''}
        ${obs.volume ? `<span class="mw-ind-chip">Vol ${fmtVol(obs.volume)}</span>` : ''}
      </div>
      <div class="mw-levels">
        ${obs_list ? `<span class="lbl">OB:</span>${obs_list}<br>` : ''}
        ${fvg_list ? `<span class="lbl">FVG:</span>${fvg_list}<br>` : ''}
        <span class="lbl">BSL:</span>${bslStr} &nbsp; <span class="lbl">SSL:</span>${sslStr}
      </div>
      ${tradeIdea}
    `;
  }

  function fmtVol(v) {
    if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
    if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
    if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
    return String(v);
  }

  // RR preview on form change
  ['fEntry','fStop','fTarget','fDir'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateRRPreview);
  });

  function updateRRPreview() {
    const dir    = document.getElementById('fDir').value;
    const entry  = parseFloat(document.getElementById('fEntry').value) || 0;
    const stop   = parseFloat(document.getElementById('fStop').value)  || 0;
    const target = parseFloat(document.getElementById('fTarget').value)|| 0;
    if (!entry || !stop || !target) { document.getElementById('rrPreview').textContent = ''; return; }
    const risk   = Math.abs(entry - stop);
    const reward = dir === 'long' ? target - entry : entry - target;
    const rr     = risk > 0 ? (reward / risk).toFixed(2) : 0;
    const col    = rr >= 2 ? '#4ade80' : rr >= 1.5 ? '#fde68a' : '#f87171';
    document.getElementById('rrPreview').innerHTML =
      `計畫 RR：<span style="color:${col};font-weight:700;">${rr}:1</span>`;
  }

  // ── Tab switching ─────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabReal').style.background = tab === 'real' ? '#1e3a8a' : '';
    document.getElementById('tabSim').style.background  = tab === 'sim'  ? '#4a1d7e' : '';
    renderJournal(tab === 'real' ? trades : simTrades);
  }

  // ── Load data ─────────────────────────────────────────────────────────────
  async function loadData() {
    const [jReal, jSim, sRes, ssRes] = await Promise.all([
      fetch('/api/trading/journal?n=50&simulated=0').then(r=>r.json()).catch(()=>({trades:[]})),
      fetch('/api/trading/journal?n=50&simulated=1').then(r=>r.json()).catch(()=>({trades:[]})),
      fetch('/api/trading/stats').then(r=>r.json()).catch(()=>({})),
      fetch('/api/trading/stats/simulated').then(r=>r.json()).catch(()=>({})),
    ]);
    trades    = jReal.trades || [];
    simTrades = jSim.trades  || [];
    renderStats(sRes);
    renderSimStats(ssRes);
    renderJournal(currentTab === 'real' ? trades : simTrades);
    // update sim badge
    const openSims = simTrades.filter(t => t.status === 'open').length;
    document.getElementById('simBadge').textContent = openSims > 0 ? `(${openSims} 開倉)` : '';
  }

  function renderStats(s) {
    document.getElementById('sTotal').textContent   = s.total   ?? '-';
    document.getElementById('sWinRate').textContent = s.winRate != null ? s.winRate + '%' : '-';
    document.getElementById('sAvgRR').textContent   = s.avgRR   ?? '-';
    document.getElementById('sWins').textContent    = s.wins    ?? '-';
    document.getElementById('sLosses').textContent  = s.losses  ?? '-';

    const bySession = s.bySession || {};
    const lines = Object.entries(bySession).map(([ses, d]) =>
      `${ses}: 勝率 ${d.winRate}%  RR ${d.avgRR}  (${d.total} 筆)`
    );
    document.getElementById('sessionStats').textContent = lines.join('  |  ');

    document.getElementById('statsLine').textContent =
      `真實 ${s.total || 0} 筆 | 勝率 ${s.winRate ?? '-'}% | 平均 RR ${s.avgRR ?? '-'}`;
  }

  function renderSimStats(s) {
    document.getElementById('ssTotal').textContent   = s.total   ?? '-';
    document.getElementById('ssWinRate').textContent = s.winRate != null ? s.winRate + '%' : '-';
    document.getElementById('ssAvgRR').textContent   = s.avgRR   ?? '-';
    document.getElementById('ssWins').textContent    = s.wins    ?? '-';
    document.getElementById('ssLosses').textContent  = s.losses  ?? '-';
  }

  // ── Scheduler status ──────────────────────────────────────────────────────
  async function loadSchedulerStatus() {
    try {
      const s = await fetch('/api/trading/scheduler').then(r=>r.json());
      const dot = document.getElementById('schedulerDot');
      dot.style.background = s.active && s.in_window ? '#4ade80' : s.active ? '#fde68a' : '#6b6f85';
      dot.title = s.active ? (s.in_window ? '看盤中' : '非看盤時間') : '未啟動';

      const lines = [
        `台灣時間：${s.taiwan_time}`,
        `狀態：${s.is_weekend ? '週末休息' : s.in_window ? '看盤中' : '非看盤時間'}${s.next_window_min > 0 ? `（${s.next_window_min} 分鐘後）` : ''}`,
        `模式：${s.mode === 'learned' ? '已優化' : '探索中'}  間隔：${s.current_interval_min} 分鐘`,
        `本週觀察：${s.observations_weekly ?? s.observations_total} 次  有結構比率：${(s.setup_hit_rate * 100).toFixed(0)}%（分數≥60）  開倉：${s.open_sim_trades} 筆`,
        `累計觀察：${s.observations_total} 次  本週起：${s.week_start || '-'}`,
      ];
      document.getElementById('schedulerStatus').innerHTML = lines.join('<br>');
    } catch {}
  }

  // ── Render journal ─────────────────────────────────────────────────────────
  function renderJournal(list) {
    const el = document.getElementById('journalList');
    if (!list.length) { el.innerHTML = '<div style="color:#6b6f85;font-size:13px;">還沒有交易記錄</div>'; return; }
    el.innerHTML = list.map(t => tradeCard(t)).join('');
  }

  function tradeCard(t) {
    const outcome = t.result?.outcome;
    const outChip = outcome
      ? `<span class="outcome-chip chip-${outcome}">${outcome}</span>`
      : `<span class="outcome-chip chip-open">OPEN</span>`;
    const dirChip    = `<span class="dir-chip chip-${t.direction}">${t.direction.toUpperCase()}</span>`;
    const simChip    = t.simulated ? `<span class="outcome-chip chip-simulated">模擬</span>` : '';
    const rrText  = t.result?.rr_achieved != null
      ? `實際 RR: ${t.result.rr_achieved}` : `計畫 RR: ${t.rr_planned}`;

    const closeBtn = t.status === 'open'
      ? `<button class="btn" style="font-size:11px;padding:3px 10px;" onclick="openCloseModal('${t.id}')">結束</button>` : '';
    const reflectBtn = t.status !== 'open' && !t.reflection
      ? `<button class="btn" style="font-size:11px;padding:3px 10px;" onclick="triggerReflect('${t.id}')">晴的反思</button>` : '';

    const reflectionEl = t.reflection
      ? `<div class="tc-reflection">${t.reflection}</div>` : '';

    const aux = Object.keys(t.auxiliary||{}).length
      ? `<div style="font-size:11px;color:#6b6f85;">輔助：${JSON.stringify(t.auxiliary)}</div>` : '';

    const ts = new Date(t.created_at).toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});

    return `<div class="trade-card" style="${t.simulated ? 'border-color:#4a2070;' : ''}">
      <div class="tc-header">
        ${dirChip} <span>${t.pair}</span> ${outChip} ${simChip}
        <span style="font-size:11px;color:#6b6f85;margin-left:auto;">${ts} ${t.session||''} ${t.timeframe||''}</span>
      </div>
      <div class="tc-prices">
        <span>入場 ${t.entry}</span><span>止損 ${t.stop}</span><span>目標 ${t.target}</span>
        <span>${t.entry_type||''}</span><span>${t.key_area||''}</span>
      </div>
      <div class="tc-rr">${rrText}</div>
      ${t.reason ? `<div class="tc-reason">${t.reason}</div>` : ''}
      ${aux}
      ${reflectionEl}
      <div class="tc-actions">${closeBtn}${reflectBtn}</div>
    </div>`;
  }

  // ── Clear simulated trades ────────────────────────────────────────────────
  async function clearSimTrades() {
    if (!confirm('清空所有模擬交易記錄？學習反思資料（reviews / hypotheses）會保留。')) return;
    const res = await apiFetch('/api/trading/simulated/all', { method: 'DELETE' }).then(r => r.json());
    if (res.ok) {
      alert(`已清除 ${res.removed} 筆模擬交易。`);
      loadData();
    } else {
      alert('清除失敗：' + (res.error || '未知錯誤'));
    }
  }

  // ── Toggle collapsible panel ────────────────────────────────────────────────
  function toggleSection(contentId, arrowId) {
    const el = document.getElementById(contentId);
    const arrow = document.getElementById(arrowId);
    const expanded = el.style.display !== 'none';
    el.style.display = expanded ? 'none' : 'block';
    if (arrow) arrow.textContent = expanded ? '▶' : '▼';
  }

  // ── Submit new trade ───────────────────────────────────────────────────────
  async function submitLog() {
    const body = {
      pair:       document.getElementById('fPair').value.trim().toUpperCase(),
      direction:  document.getElementById('fDir').value,
      entry:      parseFloat(document.getElementById('fEntry').value),
      stop:       parseFloat(document.getElementById('fStop').value),
      target:     parseFloat(document.getElementById('fTarget').value),
      session:    document.getElementById('fSession').value,
      timeframe:  document.getElementById('fTF').value,
      entry_type: document.getElementById('fEntryType').value,
      key_area:   document.getElementById('fKeyArea').value,
      structure:  document.getElementById('fStructure').value.trim(),
      reason:     document.getElementById('fReason').value.trim(),
    };
    if (!body.pair || !body.entry || !body.stop || !body.target) {
      alert('請填入交易對、入場、止損、止盈'); return;
    }
    const res = await apiFetch('/api/trading/log', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
    }).then(r=>r.json());

    if (res.validation && !res.validation.valid) {
      const msg = '⚠️ Setup 問題：\n' + res.validation.errors.join('\n');
      if (!confirm(msg + '\n\n還是要記錄嗎？')) return;
    }
    loadData();
  }

  // ── Close trade modal ──────────────────────────────────────────────────────
  function openCloseModal(id) {
    document.getElementById('closeId').value = id;
    document.getElementById('closeModal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('closeModal').classList.remove('open');
  }

  async function submitClose() {
    const id      = document.getElementById('closeId').value;
    const outcome = document.getElementById('closeOutcome').value;
    const exit    = parseFloat(document.getElementById('closeExit').value) || null;
    await apiFetch(`/api/trading/log/${id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ status:'closed', result:{ outcome, exit_price: exit } }),
    });
    closeModal();
    loadData();
  }

  // ── Trigger reflection ─────────────────────────────────────────────────────
  async function triggerReflect(id) {
    const card = event.target.closest('.trade-card');
    if (card) card.style.opacity = '0.5';
    const res = await apiFetch(`/api/trading/reflect/${id}`, { method:'POST' }).then(r=>r.json());
    loadData();
  }

  // ── Review / hypothesis ───────────────────────────────────────────────────
  async function loadReview() {
    document.getElementById('reviewPanel').style.display = 'block';
    document.getElementById('reviewTitle').textContent = '⏳ 生成回顧中...';
    document.getElementById('reviewText').textContent = '';
    const res = await fetch('/api/trading/review').then(r=>r.json());
    document.getElementById('reviewTitle').textContent = `週期性回顧（${res.trades_reviewed || 0} 筆）`;
    document.getElementById('reviewText').textContent = res.review || res.error || '';
  }

  async function loadHypothesis() {
    document.getElementById('reviewPanel').style.display = 'block';
    document.getElementById('reviewTitle').textContent = '⏳ 生成優化假設中...';
    document.getElementById('reviewText').textContent = '';
    const res = await fetch('/api/trading/hypothesis').then(r=>r.json());
    document.getElementById('reviewTitle').textContent = '策略優化假設';
    document.getElementById('reviewText').textContent = res.hypothesis || res.error || '';
  }

  async function analyzeCurrentSetup() {
    const body = {
      pair:       document.getElementById('fPair').value.trim().toUpperCase(),
      direction:  document.getElementById('fDir').value,
      entry:      parseFloat(document.getElementById('fEntry').value) || 0,
      stop:       parseFloat(document.getElementById('fStop').value)  || 0,
      target:     parseFloat(document.getElementById('fTarget').value)|| 0,
      session:    document.getElementById('fSession').value,
      timeframe:  document.getElementById('fTF').value,
      entry_type: document.getElementById('fEntryType').value,
      key_area:   document.getElementById('fKeyArea').value,
      structure:  document.getElementById('fStructure').value,
      rr_planned: parseFloat(document.getElementById('rrPreview').textContent) || 0,
    };
    if (!body.pair || !body.entry) { alert('請先填入交易對和入場價'); return; }

    const el = document.getElementById('analyzeResult');
    el.style.display = 'block';
    el.textContent = '晴正在分析...';
    const res = await apiFetch('/api/trading/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
    }).then(r=>r.json());
    el.textContent = res.analysis || res.error || '';
  }
  </script>
</body>
</html>
